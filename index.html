<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EOL Matter Plan Workflows</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/10.9.0/mermaid.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#242838;--border:#2e3348;
  --text:#e2e4eb;--text2:#9498ab;--accent:#6c8aff;--accent2:#4c6ef5;
  --pi:#f06595;--pi-bg:rgba(240,101,149,0.08);--pi-border:rgba(240,101,149,0.2);
  --wc:#ffd43b;--wc-bg:rgba(255,212,59,0.08);--wc-border:rgba(255,212,59,0.2);
  --atty:#ff6b6b;--para:#4dabf7;--admin:#51cf66;--cm:#ffd43b;--unassigned:#868e96;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{display:grid;grid-template-columns:320px 1fr;height:100vh}
.sidebar{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:0}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10}
.sidebar-header h1{font-size:16px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.sidebar-header .sub{font-size:11px;color:var(--text2);letter-spacing:0.03em;text-transform:uppercase}
.cat-label{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:16px 20px 8px;color:var(--text2)}
.plan-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 20px;border:none;background:transparent;color:var(--text);font:inherit;font-size:13px;cursor:pointer;text-align:left;transition:all 0.15s}
.plan-btn:hover{background:var(--surface2)}
.plan-btn.active{background:var(--surface2);border-left:3px solid var(--accent)}
.plan-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.plan-btn .meta{font-size:10px;color:var(--text2);margin-left:auto;white-space:nowrap}
.main{overflow-y:auto;padding:32px 40px}
.main-header{margin-bottom:24px}
.main-header h2{font-size:24px;font-weight:700;letter-spacing:-0.03em;margin-bottom:8px}
.main-header .badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;background:var(--surface2);border:1px solid var(--border)}
.badge.pi{background:var(--pi-bg);border-color:var(--pi-border);color:var(--pi)}
.badge.wc{background:var(--wc-bg);border-color:var(--wc-border);color:var(--wc)}
.tabs{display:flex;gap:2px;margin-bottom:24px;background:var(--surface);border-radius:8px;padding:3px;border:1px solid var(--border)}
.tab{padding:8px 16px;border-radius:6px;border:none;background:transparent;color:var(--text2);font:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s}
.tab.active{background:var(--accent);color:#fff}
.diagram-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;overflow-x:auto;margin-bottom:24px}
.diagram-wrap .mermaid{display:flex;justify-content:center}
.diagram-wrap svg{max-width:100%}
.stage-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden}
.stage-head{padding:14px 20px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.stage-head:hover{background:var(--surface2)}
.stage-head .num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--accent);color:#fff;flex-shrink:0}
.stage-head .sname{font-size:14px;font-weight:600}
.stage-head .scount{margin-left:auto;font-size:11px;color:var(--text2)}
.stage-head .arrow{color:var(--text2);transition:transform 0.2s;font-size:12px}
.stage-head .arrow.open{transform:rotate(90deg)}
.stage-body{border-top:1px solid var(--border);display:none}
.stage-body.open{display:block}
.task-row{display:grid;grid-template-columns:1fr 120px 60px;padding:10px 20px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:rgba(108,138,255,0.04)}
.task-name{font-weight:500}
.role-tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;text-align:center}
.role-tag.attorney{background:rgba(255,107,107,0.15);color:var(--atty)}
.role-tag.paralegal{background:rgba(77,171,247,0.15);color:var(--para)}
.role-tag.admin{background:rgba(81,207,102,0.15);color:var(--admin)}
.role-tag.cm{background:rgba(255,212,59,0.15);color:var(--cm)}
.role-tag.unassigned{background:rgba(134,142,150,0.15);color:var(--unassigned)}
.days{font-size:11px;color:var(--text2);text-align:right}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:3px}
.empty-state{text-align:center;padding:80px 20px;color:var(--text2)}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text)}
.search-box{width:100%;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font:inherit;font-size:12px;margin-top:12px}
.search-box::placeholder{color:var(--text2)}
.search-box:focus{outline:none;border-color:var(--accent)}
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
  .main{padding:16px}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>EOL Workflows</h1>
      <div class="sub">Intake → Onboarding → Resolution</div>
      <input type="text" class="search-box" id="planSearch" placeholder="Search plans..." oninput="filterPlans()">
    </div>
    <div id="planList"></div>
  </div>
  <div class="main" id="mainContent">
    <div class="empty-state">
      <h3>Select a Matter Plan</h3>
      <p>Choose a PI or Workers' Comp workflow from the sidebar</p>
    </div>
  </div>
</div>

let activePlan = null;
let activeView = 'diagram';

function filterPlans() {
  const q = document.getElementById('planSearch').value.toLowerCase();
  document.querySelectorAll('.plan-btn').forEach(btn => {
    btn.style.display = btn.dataset.name.toLowerCase().includes(q) ? '' : 'none';
  });
}

function renderSidebar() {
  const list = document.getElementById('planList');
  let html = '';
  
  html += '<div class="cat-label" style="color:var(--pi)">Personal Injury (' + PLANS.filter(p=>p.category==='pi').length + ')</div>';
  PLANS.filter(p=>p.category==='pi').forEach((p,i) => {
    const idx = PLANS.indexOf(p);
    html += '<button class="plan-btn" data-idx="'+idx+'" data-name="'+p.name+'" onclick="selectPlan('+idx+')">'
      + '<span class="dot" style="background:var(--pi)"></span>'
      + '<span>'+p.name+'</span>'
      + '<span class="meta">'+p.stages+'S · '+p.tasks+'T</span></button>';
  });
  
  html += '<div class="cat-label" style="color:var(--wc)">Workers\' Compensation (' + PLANS.filter(p=>p.category==='wc').length + ')</div>';
  PLANS.filter(p=>p.category==='wc').forEach((p,i) => {
    const idx = PLANS.indexOf(p);
    html += '<button class="plan-btn" data-idx="'+idx+'" data-name="'+p.name+'" onclick="selectPlan('+idx+')">'
      + '<span class="dot" style="background:var(--wc)"></span>'
      + '<span>'+p.name+'</span>'
      + '<span class="meta">'+p.stages+'S · '+p.tasks+'T</span></button>';
  });
  
  list.innerHTML = html;
}

function roleClass(role) {
  if (role.includes('Attorney') || role.includes('Atty')) return 'attorney';
  if (role.includes('Paralegal') || role.includes('Para')) return 'paralegal';
  if (role.includes('Admin')) return 'admin';
  if (role.includes('Case Manager')) return 'cm';
  return 'unassigned';
}

function selectPlan(idx) {
  activePlan = idx;
  activeView = 'diagram';
  document.querySelectorAll('.plan-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.plan-btn[data-idx="'+idx+'"]')?.classList.add('active');
  renderMain();
}

function switchView(view) {
  activeView = view;
  renderMain();
}

function toggleStage(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

async function renderMain() {
  const main = document.getElementById('mainContent');
  if (activePlan === null) return;
  
  const p = PLANS[activePlan];
  const catClass = p.category === 'pi' ? 'pi' : 'wc';
  const catLabel = p.category === 'pi' ? 'Personal Injury' : 'Workers\' Comp';
  
  let html = '<div class="main-header">';
  html += '<h2>'+p.name+'</h2>';
  html += '<div class="badges">';
  html += '<span class="badge '+catClass+'">'+catLabel+'</span>';
  html += '<span class="badge">'+p.stages+' Stages</span>';
  html += '<span class="badge">'+p.tasks+' Tasks</span>';
  html += '</div></div>';
  
  html += '<div class="tabs">';
  html += '<button class="tab '+(activeView==='diagram'?'active':'')+'" onclick="switchView('diagram')">Flowchart</button>';
  html += '<button class="tab '+(activeView==='stages'?'active':'')+'" onclick="switchView('stages')">Stage Detail</button>';
  html += '<button class="tab '+(activeView==='roles'?'active':'')+'" onclick="switchView('roles')">By Role</button>';
  html += '</div>';
  
  html += '<div class="legend">';
  html += '<div class="legend-item"><span class="legend-dot" style="background:var(--atty)"></span>Attorney</div>';
  html += '<div class="legend-item"><span class="legend-dot" style="background:var(--para)"></span>Paralegal</div>';
  html += '<div class="legend-item"><span class="legend-dot" style="background:var(--admin)"></span>Admin</div>';
  html += '<div class="legend-item"><span class="legend-dot" style="background:var(--cm)"></span>Case Manager</div>';
  html += '<div class="legend-item"><span class="legend-dot" style="background:var(--unassigned)"></span>Unassigned</div>';
  html += '</div>';
  
  if (activeView === 'diagram') {
    html += '<div class="diagram-wrap"><pre class="mermaid" id="mermaidDiagram">'+p.mermaid+'</pre></div>';
  } else if (activeView === 'stages') {
    p.stageDetails.forEach((s, si) => {
      html += '<div class="stage-card">';
      html += '<div class="stage-head" onclick="toggleStage(this)">';
      html += '<span class="num">'+(si+1)+'</span>';
      html += '<span class="sname">'+s.name+'</span>';
      html += '<span class="scount">'+s.tasks.length+' tasks</span>';
      html += '<span class="arrow">▶</span>';
      html += '</div>';
      html += '<div class="stage-body'+(si===0?' open':'')+'">';
      s.tasks.forEach(t => {
        html += '<div class="task-row">';
        html += '<span class="task-name">'+t.name+'</span>';
        html += '<span class="role-tag '+roleClass(t.role)+'">'+t.role+'</span>';
        html += '<span class="days">'+(t.days ? t.days+'d' : '')+'</span>';
        html += '</div>';
      });
      html += '</div></div>';
    });
  } else if (activeView === 'roles') {
    const byRole = {};
    p.stageDetails.forEach(s => {
      s.tasks.forEach(t => {
        if (!byRole[t.role]) byRole[t.role] = [];
        byRole[t.role].push({...t, stage: s.name});
      });
    });
    Object.entries(byRole).sort((a,b) => b[1].length - a[1].length).forEach(([role, tasks]) => {
      html += '<div class="stage-card">';
      html += '<div class="stage-head" onclick="toggleStage(this)">';
      html += '<span class="role-tag '+roleClass(role)+'" style="padding:4px 12px;font-size:12px">'+role+'</span>';
      html += '<span class="scount">'+tasks.length+' tasks</span>';
      html += '<span class="arrow open">▶</span>';
      html += '</div>';
      html += '<div class="stage-body open">';
      tasks.forEach(t => {
        html += '<div class="task-row">';
        html += '<span class="task-name">'+t.name+'</span>';
        html += '<span class="badge" style="font-size:10px">'+t.stage+'</span>';
        html += '<span class="days">'+(t.days ? t.days+'d' : '')+'</span>';
        html += '</div>';
      });
      html += '</div></div>';
    });
  }
  
  main.innerHTML = html;
  
  if (activeView === 'diagram') {
    await mermaid.run({ querySelector: '#mermaidDiagram' });
  }
  
  // Auto-open first stage
  const firstArrow = main.querySelector('.stage-head .arrow');
  if (firstArrow) firstArrow.classList.add('open');
}

mermaid.initialize({ 
  startOnLoad: false, 
  theme: 'dark',
  themeVariables: {
    darkMode: true,
    background: '#1a1d27',
    primaryColor: '#4c6ef5',
    primaryTextColor: '#e2e4eb',
    primaryBorderColor: '#2e3348',
    lineColor: '#6c8aff',
    secondaryColor: '#242838',
    tertiaryColor: '#2e3348'
  },
  flowchart: { 
    htmlLabels: true, 
    curve: 'basis',
    padding: 12,
    nodeSpacing: 30,
    rankSpacing: 40
  }
});

renderSidebar();
</script>
